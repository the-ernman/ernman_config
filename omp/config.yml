symbolPreset: unicode
theme:
  dark: obsidian
setupVersion: 1
modelRoles:
  default: github-copilot/gpt-5.3-codex:high
  task: github-copilot/gpt-5.4-mini:high
  plan: github-copilot/gpt-5.5-1m:xhigh
  slow: github-copilot/claude-opus-4.8-1m:xhigh
  advisor: github-copilot/claude-sonnet-4.6:high
  vision: github-copilot/gemini-3-pro-preview:high
  smol: github-copilot/gpt-5-mini:low
  tiny: github-copilot/gpt-5.4-nano:minimal
  commit: github-copilot/gpt-5-mini:low
  designer: github-copilot/gpt-5.4:high
modelProviderOrder:
  - github-copilot
  - openai
  - anthropic
  - google-gemini-cli
  - nvidia
cycleOrder:
  - smol
  - default
  - task
  - plan
  - slow
retry:
  maxRetries: 3
  baseDelayMs: 5000
  fallbackChains:
    default:
      - github-copilot/gpt-5.3-codex:high
      - github-copilot/gpt-5.2-codex:high
      - openai/gpt-5.2-codex:high
      - anthropic/claude-sonnet-4-6:high
      - google-gemini-cli/gemini-3.1-pro-preview:high
      - github-copilot/claude-opus-4.8:high
    task:
      - github-copilot/gpt-5.4-mini:high
      - github-copilot/gpt-5-mini:medium
      - openai/gpt-5.1-codex-mini:high
      - anthropic/claude-haiku-4-5:medium
      - google-gemini-cli/gemini-3.5-flash:medium
    plan:
      - github-copilot/gpt-5.5-1m:xhigh
      - github-copilot/gpt-5.5:xhigh
      - openai/gpt-5.3-codex:xhigh
      - anthropic/claude-opus-4-8-1m:xhigh
      - google-gemini-cli/gemini-3.1-pro-preview:high
    slow:
      - github-copilot/claude-opus-4.8-1m:xhigh
      - github-copilot/claude-opus-4.8:xhigh
      - anthropic/claude-opus-4-8:xhigh
      - openai/gpt-5.3-codex:xhigh
      - openai/gpt-5.5:xhigh
    advisor:
      - github-copilot/claude-sonnet-4.6:high
      - github-copilot/gpt-5.5:high
      - openai/gpt-5.2-codex:high
      - anthropic/claude-sonnet-4-6:high
    vision:
      - github-copilot/gemini-3-pro-preview:high
      - github-copilot/gpt-5.2:high
      - google-gemini-cli/gemini-3-pro-preview:high
      - openai/gpt-5.1-codex:high
    smol:
      - github-copilot/gpt-5-mini:low
      - github-copilot/claude-haiku-4.5:low
      - anthropic/claude-haiku-4-5:low
      - google-gemini-cli/gemini-3.5-flash:low
      - openai/gpt-5.4-nano:low
    tiny:
      - github-copilot/gpt-5.4-nano:minimal
      - openai/gpt-5.4-nano:minimal
      - github-copilot/claude-haiku-4.5:minimal
    commit:
      - github-copilot/gpt-5-mini:low
      - github-copilot/claude-haiku-4.5:low
      - anthropic/claude-haiku-4-5:low
      - openai/gpt-5.4-nano:low
    designer:
      - github-copilot/gpt-5.4:high
      - github-copilot/gemini-3-pro-preview:high
      - google-gemini-cli/gemini-3-pro-preview:high
      - openai/gpt-5.1-codex:high
      - anthropic/claude-sonnet-4-6:high
  fallbackRevertPolicy: cooldown-expiry
statusLine:
  preset: full
  separator: powerline
  sessionAccent: true
steeringMode: one-at-a-time
followUpMode: one-at-a-time
interruptMode: immediate
ttsr:
  enabled: true
  builtinRules: true
  contextMode: keep
  interruptMode: always
  repeatMode: after-gap
  repeatGap: 6
github:
  enabled: true
advisor:
  enabled: true
  subagents: true
  syncBacklog: 3
  immuneTurns: 1
plan:
  defaultOnStartup: true
task:
  eager: always
  showResolvedModelBadge: true
  enableLsp: true
  isolation:
    mode: auto
    merge: patch
    commits: ai
  maxConcurrency: 48
  maxRecursionDepth: 3
  agentIdleTtlMs: 900000
  softRequestBudget: 140
browser:
  headless: false
defaultThinkingLevel: auto
bash:
  enabled: true
  autoBackground:
    enabled: true
    thresholdMs: 20000
  stripTrailingHeadTail: true
bashInterceptor:
  enabled: true
  patterns:
    - pattern: ^\s*(cat|head|tail|less|more)\s+
      tool: read
      message: "Use the `read` tool instead of cat/head/tail. It provides better context and handles binary files."
    - pattern: ^\s*(grep|rg|ripgrep|ag|ack)\s+
      tool: grep
      message: "Use the `grep` tool instead of grep/rg. It respects .gitignore and provides structured output."
    - pattern: ^\s*(find|fd|locate)\s+.*(-name|-iname|-type|--type|-glob)
      tool: glob
      message: "Use the `glob` tool instead of find/fd. It respects .gitignore and is faster for glob patterns."
    - pattern: ^\s*sed\s+(-i|--in-place)
      tool: edit
      message: "Use the `edit` tool instead of sed -i. It provides diff preview and fuzzy matching."
    - pattern: "^\\s*perl\\s+.*-[pn]?i"
      tool: edit
      message: "Use the `edit` tool instead of perl -i. It provides diff preview and fuzzy matching."
    - pattern: ^\s*awk\s+.*-i\s+inplace
      tool: edit
      message: "Use the `edit` tool instead of awk -i inplace. It provides diff preview and fuzzy matching."
    - pattern: "^\\s*(echo|printf|cat\\s*<<)\\s+(?:[^\"'>]|\"[^\"]*\"|'[^']*')*(?<!\\|)>{1,2}\\|?\\s*[$\\w./~\"'-]"
      tool: write
      message: "Use the `write` tool instead of echo/cat redirection. It handles encoding and provides confirmation."
python:
  toolMode: both
  kernelMode: session
  sharedGateway: false
lsp:
  enabled: true
  formatOnWrite: true
  diagnosticsOnWrite: true
  diagnosticsOnEdit: true
extensions:
  []
disabledExtensions:
  []
read:
  defaultLimit: 200
tools:
  artifactSpillThreshold: 30
  discoveryMode: all
  approvalMode: yolo
skills:
  enabled: true
  enableSkillCommands: true
  enableCodexUser: true
  enableClaudeUser: true
  enableClaudeProject: true
  enablePiUser: true
  enablePiProject: true
  enableAgentsUser: true
  enableAgentsProject: true
  customDirectories:
    []
  ignoredSkills:
    []
  includeSkills:
    []
compaction:
  enabled: true
  strategy: context-full
  thresholdPercent: 85
  idleEnabled: true
  autoContinue: true
memory:
  backend: mnemopi
memories:
  enabled: true
contextPromotion:
  enabled: false
images:
  blockImages: true
  autoResize: true
terminal:
  showImages: true
mcp:
  enableProjectConfig: true
  discoveryMode: true
  notifications: true
  notificationDebounceMs: 250
todo:
  enabled: true
  eager: always
  reminders: true
tasks:
  todoClearDelay: 300
mnemopi:
  noEmbeddings: true
  injectionTokenLimit: 5000
  recallLimit: 10
  recallContextTurns: 5
  enhancedRecall: true
  proactiveLinking: true
  polyphonicRecall: true
display:
  showTokenUsage: true
personality: pragmatic
power:
  sleepPrevention: system
features:
  unexpectedStopDetection: true
