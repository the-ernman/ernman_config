# General
set -g base-index 1                             # Start window numbering at 1
setw -g pane-base-index 1                       # Start pane numbering at 1
set -g renumber-windows on                      # Renumber windows after one closes
set -g history-limit 10000                      # Scrollback lines per pane
set -g default-terminal "screen-256color"       # 256-color terminal inside tmux
set -ga terminal-overrides ",xterm-256color:Tc" # Enable truecolor for compatible terminals

# Performance
set -sg escape-time 10 # Lower delay for Esc/meta key handling
set -g focus-events on # Notify apps when pane gains/loses focus

# Prefix Key
unbind C-b           # Remove tmux default prefix
set -g prefix C-o    # Use Ctrl-o as prefix
bind C-o send-prefix # Send literal prefix to nested tmux sessions

# Key Bindings
bind e new-window -c "#{pane_current_path}"                           # Create new window in current path
bind r source-file ~/.tmux.conf \; display-message "Config reloaded!" # Reload config and confirm

# Split panes with | and -
bind | split-window -h -c "#{pane_current_path}" # Split horizontally, keep cwd
bind - split-window -v -c "#{pane_current_path}" # Split vertically, keep cwd

unbind %   # Remove default vertical split key
unbind '"' # Remove default horizontal split key

# Vim-style pane navigation
bind h select-pane -L # Move to left pane
bind j select-pane -D # Move to pane below
bind k select-pane -U # Move to pane above
bind l select-pane -R # Move to right pane

# Resize panes with Shift+arrow
bind -r H resize-pane -L 5 # Grow/shrink pane width left by 5
bind -r J resize-pane -D 5 # Grow/shrink pane height down by 5
bind -r K resize-pane -U 5 # Grow/shrink pane height up by 5
bind -r L resize-pane -R 5 # Grow/shrink pane width right by 5

# Mouse
set -g mouse on # Enable mouse for pane select/resize/scroll

# Status Bar
set -g status-interval 5                            # Refresh status content every 5 seconds
set -g status-left-length 30                        # Max width for left status segment
set -g status-position bottom                       # Put status bar at bottom
set -g status-right-length 50                       # Max width for right status segment
set -g message-style "fg=#d7d7ff,bg=#2a2440,bold"
set -g message-command-style "fg=#1f1f1f,bg=#af87ff,bold"
setw -g mode-style "fg=#1f1f1f,bg=#d787ff,bold"
set -g menu-style "fg=#d7d7ff,bg=#2a2440"
set -g menu-selected-style "fg=#ffffff,bg=#5f00af,bold"
set -g popup-style "fg=#d7d7ff,bg=#2a2440"
set -g popup-border-style "fg=#af87ff,bg=#2a2440"
set -g status-style "bg=#1f1f1f,fg=#d7d7ff"
set -g pane-border-style "fg=#302d41"
set -g pane-active-border-style "fg=#af87ff"
set -g pane-border-indicators colour
set -g display-panes-colour "#af87ff"
set -g display-panes-active-colour "#d787ff"
setw -g clock-mode-colour "#af87ff"
setw -g window-status-style "fg=#6c6c6c,bg=#1f1f1f"
setw -g window-status-current-style "fg=#ffffff,bg=#5f00af,bold"
set -g status-left "#[fg=#1f1f1f,bg=#af87ff,bold] #S #[fg=#d7d7ff,bg=#1f1f1f,nobold] "
set -g status-right "#[fg=#6c6c6c,bg=#1f1f1f] %Y-%m-%d %H:%M "
setw -g window-status-format " #I:#W "
setw -g window-status-current-format " #I:#W "

# Copy Mode (Vim keybindings)
setw -g mode-keys vi                                     # Use Vim keys in copy mode
bind Enter copy-mode                                     # Enter copy mode quickly
bind -T copy-mode-vi Escape send -X cancel               # Exit copy mode
bind -T copy-mode-vi v send -X begin-selection           # Start selection in copy mode
bind -T copy-mode-vi y send -X copy-selection-and-cancel # Yank selection and exit
